name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build
        run: dotnet build src/ContentScrubber.Demo/ContentScrubber.Demo.csproj --configuration Release

      - name: Test
        run: dotnet test tests/ContentScrubber.Demo.Tests/ContentScrubber.Demo.Tests.csproj --configuration Release --no-build
